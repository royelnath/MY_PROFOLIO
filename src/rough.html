<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root {
            --bg-color: #050808;
            --text-color: #ffffff;
            --glitch-cyan: #00ffff;
            --glitch-magenta: #ff00ff;
        }

        body {
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .fast-glitch {
            position: relative;
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-color);
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: 4px;
        }

        /* Create layers using the data-text attribute */
        .fast-glitch::before,
        .fast-glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        /* Only animate on hover */
        .fast-glitch:hover::before {
            animation: fast-glitch-1 0.2s infinite;
            text-shadow: 3px 0 var(--glitch-cyan);
            color: var(--glitch-cyan);
            z-index: -1;
        }

        .fast-glitch:hover::after {
            animation: fast-glitch-2 0.2s infinite;
            text-shadow: -3px 0 var(--glitch-magenta);
            color: var(--glitch-magenta);
            z-index: -2;
        }

        /* Fast "Slicing" Animation */
        @keyframes fast-glitch-1 {
            0% { clip-path: inset(20% 0 50% 0); transform: translate(-5px, -2px); }
            20% { clip-path: inset(80% 0 10% 0); transform: translate(5px, 2px); }
            40% { clip-path: inset(40% 0 40% 0); transform: translate(-5px, 2px); }
            60% { clip-path: inset(10% 0 80% 0); transform: translate(5px, -2px); }
            80% { clip-path: inset(60% 0 20% 0); transform: translate(-2px, 5px); }
            100% { clip-path: inset(30% 0 60% 0); transform: translate(0); }
        }

        @keyframes fast-glitch-2 {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(5px, 2px); }
            25% { clip-path: inset(50% 0 30% 0); transform: translate(-5px, -2px); }
            50% { clip-path: inset(30% 0 60% 0); transform: translate(5px, -2px); }
            75% { clip-path: inset(80% 0 10% 0); transform: translate(-5px, 2px); }
            100% { clip-path: inset(20% 0 50% 0); transform: translate(0); }
        }
    </style>
</head>
<body>

    <h1 class="fast-glitch" data-text="TERMINAL">TERMINAL</h1>

</body>
</html>
